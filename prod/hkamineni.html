<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kingkoti Layout</title>
    <link
      rel="stylesheet"
      href="https://cabinmate-axpert-api.s3.ap-south-1.amazonaws.com/html-files/CSS/layout.css"
    />
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            width: 100%;
        }
    </style>
</head>

<body>
    <!-- <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-spinner"></div>
    </div> -->
    <div>
        <div style="position: relative; width: 950px; height: 850px;">
            <!-- Main Floor Layout -->


            <div
                style="position: absolute; right: 4.68rem; top: 4.2rem; width: 14rem; height: 6rem; box-sizing: border-box; border: 0.8rem solid #e0e0e0; background-color: #e8f5e9;">
                <div style="position: absolute; top: 1.5rem; left: 50%; transform: translateX(-50%);">
                    <p
                        style="font-size: x-small; font-weight: bold; padding: 2px 5px; border: 1px solid #e0e0e0; background-color: #4caf50; color: white; white-space: nowrap;">
                        Reception Area
                    </p>
                </div>
            </div>

            <div
                style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 50rem; height: 35rem; box-sizing: border-box; border: 1rem solid #e0e0e0; background-color: #f5f5f5;">

                <!-- Reception Area (top-right corner) -->


                <!-- Discussion Room (top-left) -->
                <div
                    style="position: absolute; left: 0; top: 0; width: 19rem; height: 10rem; box-sizing: border-box; border: 0.3rem solid #e0e0e0;">
                    <div style="position: absolute; bottom: 2rem; left: 5.5rem;">
                        <p style="font-size: small; font-weight: bold;">
                            Discussion Room
                        </p>
                    </div>
                    <!-- Meeting table representation -->
                    <div
                        style="position: absolute; top: 3rem; left: 6rem; width: 6rem; height: 3rem; background-color: #e0e0e0; border-radius: 3px;">
                    </div>
                </div>

                <!-- Semi-AC Cubicles - Top Row (28-33) -->
                <div style="display: flex; flex-direction: row; position: absolute; left: 0; top: 10rem; gap: 0.2rem;">
                    <div class="horizontalSeat Semi-AC" id="28">28</div>
                    <div class="horizontalSeat Semi-AC" id="29">29</div>
                    <div class="horizontalSeat Semi-AC" id="30">30</div>
                    <div class="horizontalSeat Semi-AC" id="31">31</div>
                    <div class="horizontalSeat Semi-AC" id="32">32</div>
                    <div class="horizontalSeat Semi-AC" id="33">33</div>
                </div>



                <!-- Semi-AC Cubicles Label -->
                <div style="position: absolute; left: 6.3rem; top: 13.8rem;">
                    <p
                        style="font-size: x-small; font-weight: bold; padding: 1px 5px; border: 1px solid #e0e0e0; background-color: #8B4513; color: white;">
                        Semi- AC Cubicles
                    </p>
                </div>

                <!-- Co-Reading Space Label (Semi-AC) -->
                <div style="position: absolute; left: 6rem; top: 15rem;">
                    <p
                        style="font-size: x-small; font-weight: bold; padding: 1px 10px; border: 1px solid #e0e0e0; background-color: #d4a574;">
                        Co-Reading Space
                    </p>
                </div>

                <!-- Seat 27 -->
                <div style="position: absolute; left:0; top: 12.4rem;">
                    <div class="horizontalSeat Semi-AC" id="27">27</div>
                </div>

                <!-- Seat 26 -->
                <div style="position: absolute; left: 0; top: 14.8rem;">
                    <div class="horizontalSeat Semi-AC" id="26">26</div>
                </div>

                <!-- Row 25-19 -->
                <div
                    style="display: flex; flex-direction: row; position: absolute; left: 0; top: 17.2rem; gap: 0.2rem;">
                    <div class="horizontalSeat Semi-AC" id="25">25</div>
                    <div class="horizontalSeat Semi-AC" id="24">24</div>
                    <div class="horizontalSeat Semi-AC" id="23">23</div>
                    <div class="horizontalSeat Semi-AC" id="22">22</div>
                    <div class="horizontalSeat Semi-AC" id="21">21</div>
                    <div class="horizontalSeat Semi-AC" id="20">20</div>
                    <div class="horizontalSeat Semi-AC" id="19">19</div>
                </div>

                <div style="width: 19rem; height: 5px; background-color: #e0e0e0; position: absolute; top: 18.8rem;">
                </div>

                <div
                    style="width: 5px; height: 8.8rem; background-color: #e0e0e0; position: absolute; top: 10rem; left: 18.7rem">
                </div>


                <!-- Row 10-16 -->
                <div
                    style="display: flex; flex-direction: row; position: absolute; left: 0; top: 19.2rem; gap: 0.2rem;">
                    <div class="horizontalSeat Semi-AC" id="10">10</div>
                    <div class="horizontalSeat Semi-AC" id="11">11</div>
                    <div class="horizontalSeat Semi-AC" id="12">12</div>
                    <div class="horizontalSeat Semi-AC" id="13">13</div>
                    <div class="horizontalSeat Semi-AC" id="14">14</div>
                    <div class="horizontalSeat Semi-AC" id="15">15</div>
                    <div class="horizontalSeat Semi-AC" id="16">16</div>
                </div>

                <div
                    style="width: 5px; height: 14rem; background-color: #e0e0e0; position: absolute; left: 18.7rem; bottom: 0;">
                </div>

                <!-- Seat 9 -->
                <div style="position: absolute; left: 0; top: 21.4rem;">
                    <div class="horizontalSeat AC" id="9">9</div>
                </div>

                <!-- Seat 8 -->
                <div style="position: absolute; left: 0; top: 23.5rem;">
                    <div class="horizontalSeat AC" id="8">8</div>
                </div>

                <!-- AC Cubicles Label -->
                <div style="position: absolute; left: 7.4rem; top: 24.8rem;">
                    <p
                        style="font-size: x-small; font-weight: bold; padding: 1px 5px; border: 1px solid #e0e0e0; background-color: #2196f3; color: white;">
                        AC Cubicles
                    </p>
                </div>

                <!-- Co-Reading Space Label (AC) -->
                <div style="position: absolute; left: 6rem; top: 26rem;">
                    <p
                        style="font-size: x-small; font-weight: bold; padding: 1px 10px; border: 1px solid #e0e0e0; background-color: #d4a574;">
                        Co-Reading Space
                    </p>
                </div>

                <!-- Seat 7 -->
                <div style="position: absolute; left: 0; top: 26rem;">
                    <div class="horizontalSeat AC" id="7">7</div>
                </div>

                <!-- Seat 6 -->
                <div style="position: absolute; left: 0; top: 28.5rem;">
                    <div class="horizontalSeat AC" id="6">6</div>
                </div>

                <!-- Seat 5 -->
                <div style="position: absolute; left: 0; top: 31.2rem;">
                    <div class="horizontalSeat AC" id="5">5</div>
                </div>

                <!-- Bottom Row 4-1 -->
                <div
                    style="display: flex; flex-direction: row; position: absolute; left: 2.8rem; bottom: 0.3rem; gap: 0.2rem;">
                    <div class="horizontalSeat AC" id="4">4</div>
                    <div class="horizontalSeat AC" id="3">3</div>
                    <div class="horizontalSeat AC" id="2">2</div>
                    <div class="horizontalSeat AC" id="1">1</div>
                </div>

                <!-- Workstation area seats 17-18 column -->
                <div
                    style="display: flex; flex-direction: column; position: absolute; left: 16.2rem; top: 13.6rem; gap: 0.2rem;">
                    <div class="horizontalSeat Semi-AC" id="17">17</div>
                    <div class="horizontalSeat Semi-AC" id="18">18</div>
                </div>

                <!-- Workstation Label -->
                <div style="position: absolute; left: 25rem; top: 8.5rem;">
                    <p style="font-weight: bold;">
                        Workstation
                    </p>
                </div>

                <!-- Workstation seats 34-37 column -->
                <div
                    style="display: flex; flex-direction: column; position: absolute; left: 19rem; top: 12rem; gap: 0.2rem;">
                    <div class="horizontalSeat Non-AC" id="34">34</div>
                    <div class="horizontalSeat Non-AC" id="35">35</div>
                    <div class="horizontalSeat Non-AC" id="36">36</div>
                    <div class="horizontalSeat Non-AC" id="37">37</div>
                </div>

                <!-- Workstation seats 38-40 row -->
                <div
                    style="display: flex; flex-direction: row; position: absolute; left: 25rem; top: 13.7rem; gap: 0.2rem;">
                    <div class="horizontalSeat Non-AC" id="38">38</div>
                    <div class="horizontalSeat Non-AC" id="39">39</div>
                    <div class="horizontalSeat Non-AC" id="40">40</div>
                </div>

                <!-- Workstation seats 41-43 row -->
                <div
                    style="display: flex; flex-direction: row; position: absolute; left: 25rem; top: 15.4rem; gap: 0.2rem;">
                    <div class="horizontalSeat Non-AC" id="41">41</div>
                    <div class="horizontalSeat Non-AC" id="42">42</div>
                    <div class="horizontalSeat Non-AC" id="43">43</div>
                </div>

                <!-- Office Cabin 1 -->
                <div class="verticalSeat" id="44"
                    style="position: absolute; right: 0; top: 0; width: 8rem; height: 8rem;">
                    Office Cabin-1
                </div>

                <!-- Office Cabin 2 -->
                <div class="verticalSeat" id="45"
                    style="position: absolute; right: 0; top: 8rem; width: 8rem; height: 8rem;">
                    Office Cabin-2
                </div>

                <!-- Office Cabin 3 -->
                <div class="verticalSeat" id="46"
                    style="position: absolute; right: 0; top: 16rem; width: 8rem; height: 8rem;">
                    Office Cabin-3
                </div>

                <!-- Pantry Area -->
                <div
                    style="position: absolute; right: 0; bottom: 0; width: 18rem; height: 9rem; box-sizing: border-box; border: 0.3rem solid #e0e0e0;">
                    <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);">
                        <p style="font-size: 12px; font-weight: bold;">
                            Pantry Area
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cabinmate-qa.s3.ap-south-1.amazonaws.com/html-files/JS/layout.js?v=20260130"></script>
    <!-- <script src="./layout.js"></script> -->
</body>

</html>
