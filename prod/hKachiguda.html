<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kachiguda Layout</title>
    <link
      rel="stylesheet"
      href="https://cabinmate-axpert-api.s3.ap-south-1.amazonaws.com/html-files/CSS/layout.css"
    />
    <style>
        body {
          display: flex;
          justify-content: center;
          align-items: center;
          min-height: 100vh;
          width: 100%;
        }
    </style>
  </head>

  <body>
    <div id="loadingOverlay" class="loading-overlay">
      <div class="loading-spinner"></div>
    </div>
    <div>
      <div style="position: relative; width: 800px; height: 750px;">
        <!-- Main Floor Layout -->
        <div  style="position: absolute;left: 50%;top: 50%;transform: translate(-50%, -50%);width: 32rem;height: 40rem;box-sizing: border-box;border: 1rem solid #e0e0e0;background-color: #f5f5f5;">
          <!-- Entrance Path -->
          <div style="position: absolute; left: -1rem; top: 17.5rem; width: 1rem; height: 6rem; background-color: white;"></div>
          <!-- Entrance Label -->
          <div style="position: absolute; left: 0.5rem; top: 20rem">
            <p style="font-size: small; font-weight: bold; rotate: 270deg">
              ENTRANCE
            </p>
          </div>
          <!-- Reception Area -->
          <div
            style="position: absolute;left: 0;bottom: 0;width: 20rem;height: 10rem;box-sizing: border-box;border: 0.3rem solid #e0e0e0;background-color: #e8f5e9;">
            <div style="position: absolute;top: 4rem;left: 50%;transform: translateX(-50%);">
              <p
                style="font-size: small;font-weight: bold;padding: 1px 17px;border: 1px solid #e0e0e0;background-color: #4caf50;color: white;">
                Reception Area
              </p>
            </div>
          </div>
          <div
            style="display: flex;flex-direction: column;position: absolute;left: 0;top: 0;gap: 0.2rem;">
            <div class="horizontalSeat Non-AC" id="7">7</div>
            <div class="horizontalSeat Non-AC" id="6">6</div>
            <div class="horizontalSeat Non-AC" id="5">5</div>
            <div class="horizontalSeat Non-AC" id="4">4</div>
            <div class="horizontalSeat Non-AC" id="3">3</div>
            <div class="horizontalSeat Non-AC" id="2">2</div>
            <div class="horizontalSeat Non-AC" id="1">1</div>
          </div>
          <!-- Central Top Row: Sections 8, 15 -->
          <div
            style="display: flex;flex-direction: row;position: absolute;left: 12rem;top: 0.5rem;gap: 0.2rem;">
            <div class="horizontalSeat Non-AC" id="8">8</div>
            <div class="horizontalSeat Non-AC" id="15">15</div>
          </div>
          <!-- Central Middle Row: Sections 9, 14 -->
          <div
            style="display: flex;flex-direction: row;position: absolute;left: 12rem;top: 2.2rem;gap: 0.2rem;">
            <div class="horizontalSeat Non-AC" id="9">9</div>
            <div class="horizontalSeat Non-AC" id="14">14</div>
          </div>
          <div
            style="display: flex;flex-direction: row;position: absolute;left: 12rem;top: 3.9rem;gap: 0.2rem;">
            <div class="horizontalSeat Non-AC" id="11">11</div>
            <div class="horizontalSeat Non-AC" id="12">12</div>
          </div>
          <!-- Sections 10 and 13 (between rows) -->
          <div
            style="display: flex;flex-direction: row;position: absolute;left: 12rem;top: 5.6rem;gap: 0.2rem;">
            <div class="horizontalSeat Non-AC" id="10">10</div>
            <div class="horizontalSeat Non-AC" id="13">13</div>
          </div>
          <div
            style="display: flex;flex-direction: column;position: absolute;right: 0;top: 0;gap: 0.2rem;">
            <div class="horizontalSeat Non-AC" id="16">16</div>
            <div class="horizontalSeat Non-AC" id="17">17</div>
            <div class="horizontalSeat Non-AC" id="18">18</div>
            <div class="horizontalSeat Non-AC" id="19">19</div>
            <div class="horizontalSeat Non-AC" id="20">20</div>
          </div>
          <!-- Pantry Area -->
          <div
            style="position: absolute;right: 0;top: 20rem;width: 14rem;height: 10rem;box-sizing: border-box;border: 0.3rem solid #e0e0e0;background-color: #fff3e0;">
            <div style="width: 7rem;position: absolute;top: 3rem;left: 50%;transform: translateX(-50%);">
              <p style="font-size: small;font-weight: bold;padding: 1px 17px;border: 1px solid #e0e0e0;background-color: #ff9800;color: white;">
                Pantry Area
              </p>
            </div>
          </div>
          <!-- Office Room -->
          <div style="position: absolute;right: 0;bottom: 0;width: 14rem;height: 10rem;box-sizing: border-box;border: 0.3rem solid #e0e0e0;background-color: #e3f2fd;">
            <div style="position: absolute;width: 7rem;top: 4rem;left: 50%;transform: translateX(-50%);">
              <p style="font-size: small;font-weight: bold;padding: 1px 17px;border: 1px solid #e0e0e0;background-color: #2196f3;color: white;">
                Office Room
              </p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cabinmate-axpert-api.s3.ap-south-1.amazonaws.com/html-files/JS/layout.js?v=20251118"></script>
  </body>
</html>
