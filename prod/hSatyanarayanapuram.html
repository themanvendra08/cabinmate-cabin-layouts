<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Satyanarayanapuram Layout</title>
    <link rel="stylesheet" href="https://cabinmate-axpert-api.s3.ap-south-1.amazonaws.com/html-files/CSS/layout.css">
</head>
<body>
    <!-- <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div> -->

    <div style="position: relative; margin: 60px; width: 1300px; height: 520px;">

        <!-- Staircase (top-left, outside building) -->
        <div style="
            position: absolute;
            left: 0;
            top: 0;
            width: 6.5rem;
            height: 3.5rem;
            background-color: #7a7a7a;
            display: flex;
            align-items: center;
            justify-content: center;
        ">
            <p style="font-size: x-small; font-weight: bold; color: white; margin: 0; text-align: center;">Staircase</p>
        </div>

        <!-- Reception Area (bottom-left, outside building) -->
        <div style="
            position: absolute;
            left: 0;
            bottom: 7.5rem;
            width: 6.5rem;
            height: 4.5rem;
            border: 2px solid #333;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
        ">
            <p style="font-size: x-small; font-weight: bold; margin: 0; text-align: center;">Reception<br>Area</p>
        </div>

        <!-- Main building outline -->
        <div style="
            position: absolute;
            left: 7.5rem;
            top: 0;
            width: 70rem;
            height: 25rem;
            border: 0.7rem solid #8a7d6e;
            box-sizing: border-box;
        ">

            <!-- ===== AC CABIN SEATS ===== -->

            <!-- Column 1: seats 4, 3, 2, 1 (top to bottom) -->
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 0.2rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="4">4</div>
                <div class="horizontalSeat AC" id="3">3</div>
                <div class="horizontalSeat AC" id="2">2</div>
                <div class="horizontalSeat AC" id="1">1</div>
            </div>

            <!-- Column pair: 5,6,7,8 (left) | 12,11,10,9 (right) — small within-pair gap, large aisle before next pair -->
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 4.3rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="5">5</div>
                <div class="horizontalSeat AC" id="6">6</div>
                <div class="horizontalSeat AC" id="7">7</div>
                <div class="horizontalSeat AC" id="8">8</div>
            </div>
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 7.0rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="12">12</div>
                <div class="horizontalSeat AC" id="11">11</div>
                <div class="horizontalSeat AC" id="10">10</div>
                <div class="horizontalSeat AC" id="9">9</div>
            </div>

            <!-- Column pair: 13,14,15,16 (left) | 20,19,18,17 (right) — small within-pair gap, large aisle before next pair -->
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 11.4rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="13">13</div>
                <div class="horizontalSeat AC" id="14">14</div>
                <div class="horizontalSeat AC" id="15">15</div>
                <div class="horizontalSeat AC" id="16">16</div>
            </div>
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 14.1rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="20">20</div>
                <div class="horizontalSeat AC" id="19">19</div>
                <div class="horizontalSeat AC" id="18">18</div>
                <div class="horizontalSeat AC" id="17">17</div>
            </div>

            <!-- Column pair: 21,22,23,24 (left) | 28,27,26,25 (right) — small within-pair gap, large aisle before next pair -->
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 18.5rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="21">21</div>
                <div class="horizontalSeat AC" id="22">22</div>
                <div class="horizontalSeat AC" id="23">23</div>
                <div class="horizontalSeat AC" id="24">24</div>
            </div>
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 21.2rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="28">28</div>
                <div class="horizontalSeat AC" id="27">27</div>
                <div class="horizontalSeat AC" id="26">26</div>
                <div class="horizontalSeat AC" id="25">25</div>
            </div>

            <!-- Single column: 29, 30, 31, 32 — large aisle before this column -->
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 25.6rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="29">29</div>
                <div class="horizontalSeat AC" id="30">30</div>
                <div class="horizontalSeat AC" id="31">31</div>
                <div class="horizontalSeat AC" id="32">32</div>
            </div>

            <!-- Single column: 33, 34 (AC seats, just left of the thick wall) -->
            <div style="display: flex; flex-direction: column; position: absolute; top: 0.4rem; left: 29.1rem; gap: 0.3rem;">
                <div class="horizontalSeat AC" id="33">33</div>
                <div class="horizontalSeat AC" id="34">34</div>
            </div>

            <!-- Entrance label (bottom-left) -->
            <p style="font-size: x-small; position: absolute; bottom: 5.5rem; left: 0.5rem; margin: 0;">Entrance</p>

            <!-- Walking way -->
            <div style="position: absolute; bottom: 5.1rem; left: 3.5rem; display: flex; align-items: center; gap: 0.5rem;">
                <span style="font-size: medium; font-weight: bold;">&#9658;</span>
                <!-- Walking person icon -->
                <div style="display: flex; flex-direction: column; align-items: center;">
                    <div style="width: 0.7rem; height: 0.7rem; border-radius: 50%; background-color: #555;"></div>
                    <div style="width: 0.2rem; height: 0.9rem; background-color: #555;"></div>
                </div>
                <span style="font-size: small; font-weight: bold;">WALKING WAY</span>
                <span style="font-size: medium; font-weight: bold;">&#9658;</span>
            </div>

            <!-- A/C CABIN label (bottom-center of AC area) -->
            <p style="font-size: small; font-weight: bold; position: absolute; bottom: 12rem; left: 10rem; padding: 3px 20px; border: 1px solid #999; margin: 0;">AC CABINS</p>

            <!-- Divider wall between AC and NON-AC (thick, dark vertical wall) -->
            <div style="
                position: absolute;
                top: 0;
                left: 32rem;
                width: 2rem;
                height: 15rem;
                background-color: #4a3a2a;
            "></div>

            <!-- Door arc (entrance curve at bottom-left wall) -->
            <div style="
                position: absolute;
                bottom: 4rem;
                left: 0rem;
                width: 3.5rem;
                height: 3.5rem;
                border-bottom: 2px solid #8a7d6e;
                border-right: 2px solid #8a7d6e;
                border-top: 2px solid #8a7d6e;
            "></div>

            <!-- ===== NON A/C CABIN (top-right section) ===== -->
            <div style="
                position: absolute;
                top: 0;
                left: 34rem;
                width: 18.5rem;
                height: 15rem;
                border-right: 0.6rem solid #8a7d6e;
                border-bottom: 0.6rem solid #8a7d6e;
                box-sizing: border-box;
            ">
                <!-- Seats 1, 2, 3, 4 — top row, starting from left -->
                <div style="display: flex; position: absolute; top: 0.4rem; left: 0.4rem; gap: 2.4rem;">
                    <div class="horizontalSeat Non-AC" id="35">1</div>
                    <div class="horizontalSeat Non-AC" id="36">2</div>
                    <div class="horizontalSeat Non-AC" id="37">3</div>
                    <div class="horizontalSeat Non-AC" id="38">4</div>
                </div>
                <!-- NON A/C CABIN label -->
                <p style="
                    font-size: small;
                    font-weight: bold;
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, 10%);
                    border: 1px solid #999;
                    padding: 5px 10px;
                    white-space: nowrap;
                    margin: 0;
                ">NON A/C CABIN</p>
                <!-- Seat 5 — bottom-left -->
                <div style="position: absolute; bottom: 0.4rem; left: 0.4rem;">
                    <div class="horizontalSeat Non-AC" id="39">5</div>
                </div>
                <!-- Seat 6 — bottom-right -->
                <div style="position: absolute; bottom: 0.4rem; right: 0.4rem;">
                    <div class="horizontalSeat Non-AC" id="40">6</div>
                </div>
            </div>

            <!-- ===== LOCKERS (vertical strip) ===== -->
            <div style="
                position: absolute;
                top: 0;
                left: 52.5rem;
                width: 2.5rem;
                height: 15rem;
                border-left: 0.6rem solid #8a7d6e;
                border-right: 0.6rem solid #8a7d6e;
                box-sizing: border-box;
                display: flex;
                align-items: center;
                justify-content: center;
            ">
                <p style="
                    font-size: xx-small;
                    font-weight: bold;
                    writing-mode: vertical-rl;
                    transform: rotate(180deg);
                    letter-spacing: 2px;
                    margin: 0;
                ">LOCKERS</p>
            </div>

            <!-- ===== PANTRY (far-right room, full height) ===== -->
            <div style="
                position: absolute;
                top: 0;
                left: 55rem;
                right: 0;
                bottom: 0;
                border-left: 0.6rem solid #8a7d6e;
                box-sizing: border-box;
            ">
                <p style="font-size: small; font-weight: bold; position: absolute; top: 6rem; left: 50%; transform: translateX(-50%); margin: 0; white-space: nowrap;">Pantry</p>
                <!-- Appliance/sink icons (stacked) -->
                <div style="position: absolute; top: 3rem; right: 1rem; display: flex; flex-direction: column; gap: 0.6rem;">
                    <div style="width: 2.5rem; height: 2rem; border: 2px solid #777; border-radius: 4px; box-sizing: border-box;"></div>
                    <div style="width: 2.5rem; height: 2rem; border: 2px solid #777; border-radius: 4px; box-sizing: border-box;"></div>
                    <div style="width: 2.5rem; height: 2rem; border: 2px solid #777; border-radius: 4px; box-sizing: border-box;"></div>
                </div>
            </div>

            <!-- ===== LADIES WASHROOM (bottom, left of right zone) ===== -->
            <div style="
                position: absolute;
                bottom: 0;
                left: 34rem;
                width: 10rem;
                height: 9rem;
                border-right: 0.6rem solid #8a7d6e;
                box-sizing: border-box;
                display: flex;
                align-items: center;
                justify-content: center;
            ">
                <p style="font-size: x-small; font-weight: bold; text-align: center; margin: 0;">Ladies<br>Washroom</p>
            </div>

            <!-- ===== GENTS WASHROOM (bottom, right of right zone) ===== -->
            <div style="
                position: absolute;
                bottom: 0;
                left: 44rem;
                width: 11rem;
                height: 10rem;
                border-right: 0.6rem solid #8a7d6e;
                box-sizing: border-box;
                display: flex;
                align-items: center;
                justify-content: center;
            ">
                <p style="font-size: x-small; font-weight: bold; text-align: center; white-space: nowrap; margin: 0;">Gents<br>Washroom</p>
            </div>

        </div>

        <!-- Balcony label (right side, outside building) -->
        <p style="
            font-size: small;
            font-weight: bold;
            position: absolute;
            right: 10rem;
            top: 15rem;
            writing-mode: horizontal-tb;
            margin: 0;
        ">Balcony</p>

    </div>

    <script src="https://cabinmate-axpert-api.s3.ap-south-1.amazonaws.com/html-files/JS/layout.js?v=20250301"></script>
</body>
</html>
